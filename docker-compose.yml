services:
  postgres:
    image: postgres:16-alpine
    container_name: hr-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hr_system}
      POSTGRES_USER: ${POSTGRES_USER:-hr_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hr_secure_pass}
    volumes:
      - hr_postgres_data:/var/lib/postgresql/data
    networks:
      - hr-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hr_user} -d ${POSTGRES_DB:-hr_system}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hr-app
    restart: always
    environment:
      - PORT=5000
      - DATABASE_URL=postgres://${POSTGRES_USER:-hr_user}:${POSTGRES_PASSWORD:-hr_secure_pass}@postgres:5432/${POSTGRES_DB:-hr_system}?sslmode=disable
      - SESSION_SECRET=${SESSION_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hr-network

  nginx:
    image: nginx:alpine
    container_name: hr-nginx
    restart: always
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - hr-network

volumes:
  hr_postgres_data:
    name: hr_postgres_data

networks:
  hr-network:
    name: hr-network
    driver: bridge
